version: 2

models:
  - name: dim_metric_type
    description: "Dimension model for metric types."
    columns:
      - name: metric_type_key
        description: "Unique identifier for each record."
        tests:
          - unique
          - not_null

      - name: metric_type_id
        description: "Unique identifier for each metric type."

      - name: metric_type_name
        description: "Name of the metric type."
    
  - name: dim_sensor
    description: "Dimension model for sensors."
    columns:
      - name: sensor_key
        description: "Unique identifier for each record."
        tests:
          - unique
          - not_null

      - name: sensor_id
        description: "Unique identifier for each sensor."

      - name: sensor_type_id
        description: "Identifier for the type of sensor."
      
      - name: sensor_type_name
        description: "Name of the sensor type."
      
      - name: is_hive_level
        description: "Indicates if the sensor is at the hive level." 

      - name: hive_id
        description: "Identifier for the hive associated with the sensor."

      - name: status
        description: "Current status of the sensor."

      - name: installed_at
        description: "Timestamp when the sensor was installed."

      - name: valid_from
        description: "Timestamp indicating when the record became valid."

      - name: valid_to
        description: "Timestamp indicating when the record is no longer valid." 
  
      - name: is_current
        description: "Indicates if the record is the current version."

  - name: dim_alarm_rule
    description: "Dimension model for alarm rules defining monitoring conditions."
    columns:
      - name: alarm_rule_key
        description: "Unique identifier for each alarm rule record."
        tests:
          - unique
          - not_null
      - name: rule_id
        description: "Business key identifier for the alarm rule."
        tests:
          - not_null
      - name: rule_name
        description: "Name of the alarm rule."
        tests:
          - not_null
      - name: metric_type_id
        description: "Identifier for the metric type being monitored."
        tests:
          - not_null
      - name: metric_type_name
        description: "Name of the metric type being monitored."
      - name: condition_type
        description: "Type of condition for the alarm (e.g., greater than, less than)."
        tests:
          - not_null
      - name: threshold
        description: "Threshold value for triggering the alarm."
        tests:
          - not_null
      - name: severity_id
        description: "Identifier for the severity level of the alarm."
      - name: severity_name
        description: "Name of the severity level of the alarm."
      - name: is_active
        description: "Boolean indicating if the alarm rule is currently active."
        tests:
          - not_null
  
    

      